name: Bug report
description: Report a reproducible bug in RegressProof-cli
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail for reproduction.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A short description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact commands, files, or changes that reproduce the problem
      placeholder: |
        1. Run ...
        2. Change ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation context
      description: Include `verify-mvp`, fixture, or trust-scenario output if relevant
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: e.g. v0.1.0 or commit SHA
